version: 2

models:
  - name: d_calendar
    description: "calendar dimension "
    columns:
      - name: date_actual
        tests: [not_null, unique] 
  - name: d_currency
    description: "Currency dimension"
    columns:
      - name: currency_key
        tests: [not_null, unique]
      - name: currency_code
        tests: [not_null, unique]
 
  - name: f_loanbook
    description: "Daily loan snapshots with outstanding balance translated to USD"      
    columns:
      - name: snapshot_date_key
        tests: [not_null]
      - name: currency_key
        tests: [not_null]
      - name: loan_id
        tests: [not_null]
      - name: fx_rate_to_usd
        description: "Null if no FX rate available for that month-end"
      - name: outstanding_usd
        description: "Null for Submission status"